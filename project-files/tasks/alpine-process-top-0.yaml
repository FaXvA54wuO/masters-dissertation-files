id: ALPINE.PROCESS.TOP.0
version: 1
category: process
action: command
impact: PASSIVE
volatility: 10
priority: 2
requires_elevation: false
evidential_source:
- /proc
commands_used:
- top
output_type: file
output_path: process/top_snapshot.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  if command -v top >/dev/null 2>&1; then
    top -b -n 1 >"${output_file}" 2>>"${LOG}"
  else
    printf '%s\n' "top not present" >"${output_file}"
  fi
description: |
  Summary:
    Captures a single point-in-time snapshot of system activity using the top
    command in batch mode.

  Dependencies:
    Requires the top command to be available on the system. The variables
    TASK_OUTPUT and LOG must be defined, and a mkparent function must be
    available to create the output path.

  Output:
    Writes the output of a single non-interactive top execution to the path defined
    by output_path, provided at runtime via TASK_OUTPUT. If the top command is not
    available on the system, a message indicating its absence is written instead.

  Notes:
    The command is executed in batch mode with a single iteration to avoid
    interaction and minimise impact. Availability of top is not guaranteed on
    minimal Alpine BusyBox systems, and absence is recorded explicitly to preserve
    evidential completeness.
references:
- Derived from UAC artifacts live_response process top.yaml; OS-specific variants consolidated into a single BusyBox-compatible batch execution with presence detection.
