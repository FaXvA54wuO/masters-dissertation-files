id: ALPINE.NETWORK.HOSTNAME.1
version: 1
category: network
action: command
impact: PASSIVE
volatility: 20
priority: 3
requires_elevation: false
evidential_source:
- kernel host name
commands_used:
- uname
output_type: file
output_path: network/uname_n.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  uname -n >"${output_file}" 2>>"${LOG}"
description: |
  Summary:
    Captures the system hostname as reported by the kernel using uname -n.

  Dependencies:
    Requires the uname command to be available on the system. The variables
    TASK_OUTPUT and LOG must be defined, and a mkparent function must be available
    to create the output path.

  Output:
    Writes the kernel-reported nodename to the path defined by output_path,
    provided at runtime via TASK_OUTPUT.

  Notes:
    The uname -n value reflects the kernel's notion of the system hostname and
    may differ from values returned by the hostname command depending on system
    configuration. Capturing both provides an opportunity to identify
    inconsistencies or tampering.
references:
- Derived from UAC network hostname.yaml; retained as a separate command source for comparison with hostname output.
