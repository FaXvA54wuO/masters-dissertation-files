id: ALPINE.NETWORK.HOSTNAME.0
version: 1
category: network
action: command
impact: PASSIVE
volatility: 20
priority: 2
requires_elevation: false
evidential_source:
- kernel host name
commands_used:
- hostname
output_type: file
output_path: network/hostname.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  if hostname -f >"${output_file}" 2>>"${LOG}"; then
    :
  else
    hostname >"${output_file}" 2>>"${LOG}" || printf '%s\n' "command failed" >"${output_file}"
  fi
description: |
  Summary:
    Captures the system hostname, preferring the fully qualified domain name
    where available.

  Dependencies:
    Requires the hostname command to be available on the system. The variables
    TASK_OUTPUT and LOG must be defined, and a mkparent function must be available
    to create the output path.

  Output:
    Writes a single hostname value to the path defined by output_path, provided at
    runtime via TASK_OUTPUT. The fully qualified domain name is used where
    supported, otherwise the base hostname is recorded.

  Notes:
    The hostname -f option is preferred as it provides the fully qualified domain
    name when available. On minimal Alpine BusyBox systems, this option may not be
    supported; in such cases, the base hostname is used as a fallback.
references:
- Derived from UAC network hostname.yaml; simplified to a single authoritative hostname value with fallback handling.
