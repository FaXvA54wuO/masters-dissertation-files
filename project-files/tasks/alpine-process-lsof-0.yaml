id: ALPINE.PROCESS.LSOF.0
version: 1
category: process
action: command
impact: PASSIVE
volatility: 10
priority: 3
requires_elevation: true
evidential_source:
- /proc/[pid]/fd
commands_used:
- lsof
output_type: file
output_path: process/lsof.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  if command -v lsof >/dev/null 2>&1; then
    lsof >"${output_file}" 2>>"${LOG}"
  else
    printf '%s\n' "lsof not present" >"${output_file}"
  fi
description: |
  Summary:
    Captures a snapshot of open file descriptors across processes using the lsof
    command.

  Dependencies:
    Requires the lsof command to be available on the system. The variables
    TASK_OUTPUT and LOG must be defined, and a mkparent function must be available
    to create the output path.

  Output:
    Writes the output of the lsof command to the path defined by output_path,
    provided at runtime via TASK_OUTPUT.

  Notes:
    On Alpine systems, lsof may be provided as a BusyBox applet with reduced
    functionality. Common flags such as -nPl may not be supported. Running with
    elevated privileges improves coverage across processes.
references:
- Derived from UAC artifacts live_response process lsof.yaml; adapted to Alpine BusyBox lsof applet with reduced flag support.
