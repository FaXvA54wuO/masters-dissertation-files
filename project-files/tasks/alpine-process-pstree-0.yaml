id: ALPINE.PROCESS.PSTREE.0
version: 1
category: process
action: command
impact: PASSIVE
volatility: 10
priority: 5
requires_elevation: false
evidential_source:
- /proc
commands_used:
- pstree
output_type: file
output_path: process/pstree.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  if command -v pstree >/dev/null 2>&1; then
    pstree -p \
      >"${output_file}" \
      2>>"${LOG}"
  else
    printf '%s\n' "pstree not present" >"${output_file}"
  fi
description: |
  Summary:
    Captures a hierarchical view of running processes to illustrate parent-child
    relationships.

  Dependencies:
    Requires the pstree command to be available on the system. The variables
    TASK_OUTPUT and LOG must be defined, and a mkparent function must be available
    to create the output path.

  Output:
    Writes the output of pstree with process identifiers included to the path
    defined by output_path, provided at runtime via TASK_OUTPUT. If the pstree
    command is not available on the system, a message indicating its absence is
    written instead.

  Notes:
    The pstree -p option is used to include process identifiers, allowing
    correlation with ps output and /proc-based artefacts. On minimal Alpine
    BusyBox systems, pstree may have limited functionality and may not support
    additional flags such as -a or -n.
references:
- Derived from UAC artifacts live_response process pstree.yaml; reduced to BusyBox-compatible pstree -p with unsupported options excluded.
