id: ALPINE.PROCESS.PS.0
version: 1
category: process
action: command
impact: PASSIVE
volatility: 10
priority: 0
requires_elevation: true
evidential_source:
- /proc
- /proc/[pid]/stat
- /proc/[pid]/cmdline
commands_used:
- ps
output_type: file
output_path: process/ps-all.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  ps -o pid,ppid,pgid,user,group,etime,nice,rgroup,ruser,time,tty,vsz,sid,stat,rss,comm,args \
    >"${output_file}" 2>>"${LOG}"
description: |
  Summary:
    Captures a structured snapshot of all running processes using BusyBox ps with
    a fixed and deterministic column layout.
  
  Dependencies:
    Requires the ps command and specified columns to be available on the system.
    The variables TASK_OUTPUT and LOG must be defined, and a mkparent function
    must be available to create the output path.
    
  Output:
    Writes a complete process listing to the path defined by output_path, provided
    at runtime via TASK_OUTPUT. The output includes process identifiers (PID, PPID,
    PGID, SID), ownership (effective and real user/group), execution context (TTY,
    state, priority), timing information (elapsed and CPU time), memory usage
    (VSZ, RSS), and both the command name (comm) and full argument list (args).
  
  Notes:
    The args field is positioned last to account for BusyBox ps formatting behaviour.
    This task serves as a primary volatile process inventory for triage and
    correlation with other artefacts.
references:
- Derived from UAC artifacts live_response process ps.yaml; procps and BSD variants consolidated into a single BusyBox-compatible ps -o execution.
