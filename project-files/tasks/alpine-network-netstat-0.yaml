id: ALPINE.NETWORK.NETSTAT.0
version: 1
category: network
action: command
impact: PASSIVE
volatility: 20
priority: 9
requires_elevation: true
evidential_source:
- socket tables
commands_used:
- netstat
output_type: file
output_path: network/netstat_an.txt
environment: ash
script: |
  output_file="$(mkparent "${TASK_OUTPUT}")"

  if command -v netstat >/dev/null 2>&1; then
    netstat -an \
      >"${output_file}" \
      2>>"${LOG}" || printf '%s\n' "command failed" >"${output_file}"
  else
    printf '%s\n' "netstat not present" >"${output_file}"
  fi
description: |
  Summary:
    Captures active and listening network sockets using netstat in numeric mode.

  Dependencies:
    Requires the netstat command to be available on the system. The variables
    TASK_OUTPUT and LOG must be defined, and a mkparent function must be available
    to create the output path.

  Output:
    Writes the output of netstat -an to the path defined by output_path,
    provided at runtime via TASK_OUTPUT.

  Notes:
    The -an flags are used to display all sockets without name resolution,
    ensuring consistent and complete output across environments. BusyBox netstat
    provides a reduced feature set compared to full implementations; unsupported
    flags have been excluded to ensure predictable behaviour.
references:
- Derived from UAC network netstat.yaml; reduced to a single authoritative socket snapshot using BusyBox-compatible flags.
